<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汉坦病毒疫情实时看板 — 大西洋号邮轮事件</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #0a0e17;
            color: #e0e6ed;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* ─── 导航栏 ─────────────────────────────────────── */
        .navbar {
            background: rgba(10, 14, 23, 0.95);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }
        .nav-logo {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .nav-logo svg { width: 20px; height: 20px; }
        .nav-title { font-size: 16px; font-weight: 600; color: #f8fafc; }
        .nav-subtitle { font-size: 11px; color: #64748b; margin-left: 8px; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: #94a3b8;
        }
        .status-dot {
            width: 8px; height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .nav-update {
            font-size: 12px; color: #64748b;
            padding: 4px 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 4px;
        }

        /* ─── 主内容 ─────────────────────────────────────── */
        .main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: auto auto 1fr auto;
            gap: 16px;
            height: calc(100vh - 56px);
        }

        /* ─── 卡片样式 ─────────────────────────────────────── */
        .card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            padding: 16px;
            backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-orange { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .badge-blue { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge-green { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-purple { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }

        /* ─── 邮轮疫情卡片 ─────────────────────────────────────── */
        .cruise-card {
            grid-column: 1 / 4;
            grid-row: 1;
        }

        .cruise-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto auto;
            gap: 12px;
        }

        /* 传播方式占2列宽 */
        .cruise-detail:nth-child(4) {
            grid-column: span 2;
        }

        .cruise-detail {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 8px;
            padding: 12px;
            border-left: 3px solid #f97316;
            min-width: 0;
        }

        .cruise-detail-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .cruise-detail-value {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
            word-break: break-word;
            line-height: 1.4;
        }

        .cruise-detail-value.highlight {
            color: #f97316;
        }

        /* ─── 全球统计 ─────────────────────────────────────── */
        .global-stats {
            grid-column: 1;
            grid-row: 2;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-item {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
            font-variant-numeric: tabular-nums;
        }
        .stat-value.red { color: #ef4444; }
        .stat-value.orange { color: #f97316; }
        .stat-value.blue { color: #3b82f6; }
        .stat-value.green { color: #10b981; }
        .stat-value.cyan { color: #06b6d4; }
        .stat-value.purple { color: #8b5cf6; }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .stat-note {
            font-size: 10px;
            color: #64748b;
            margin-top: 2px;
        }

        .stat-highlight {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* ─── 各国数据列表 ─────────────────────────────────────── */
        .country-list {
            grid-column: 1;
            grid-row: 3;
            overflow-y: auto;
        }

        .country-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 8px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .country-item:hover {
            background: rgba(30, 41, 59, 0.6);
            border-left-color: #3b82f6;
        }

        .country-item.risk-high { border-left-color: #ef4444; }
        .country-item.risk-medium { border-left-color: #f97316; }
        .country-item.risk-low { border-left-color: #10b981; }

        .country-info { flex: 1; }
        .country-name {
            font-size: 13px;
            font-weight: 600;
            color: #f8fafc;
        }
        .country-region {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }
        .country-detail {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
            font-style: italic;
        }

        .country-stats {
            text-align: right;
        }
        .country-cases {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
            font-variant-numeric: tabular-nums;
        }
        .country-deaths {
            font-size: 11px;
            color: #ef4444;
        }

        /* ─── 地图区域 ─────────────────────────────────────── */
        .map-container {
            grid-column: 2;
            grid-row: 2 / 4;
            position: relative;
            padding: 0;
            overflow: visible;
            min-height: 400px;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            z-index: 1;
            min-height: 400px;
        }

        /* 修复 Leaflet 地图空白问题 */
        .leaflet-container {
            width: 100% !important;
            height: 100% !important;
        }

        .leaflet-tile-container {
            transform: none !important;
        }

        .leaflet-tile {
            transition: none !important;
        }

        .map-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px;
            backdrop-filter: blur(8px);
        }

        .map-legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #94a3b8;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .legend-dot.high { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        .legend-dot.medium { background: #f97316; box-shadow: 0 0 8px rgba(249, 115, 22, 0.5); }
        .legend-dot.low { background: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }

        /* ─── 新闻区域 ─────────────────────────────────────── */
        .news-panel {
            grid-column: 3;
            grid-row: 2 / 4;
            overflow-y: auto;
        }

        .news-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            transition: all 0.2s;
        }

        .news-item:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .news-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .news-title {
            font-size: 13px;
            font-weight: 600;
            color: #f8fafc;
            flex: 1;
            line-height: 1.4;
        }

        .news-severity {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            white-space: nowrap;
        }
        .severity-critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .severity-high { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .severity-medium { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .severity-low { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .severity-info { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .news-meta {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .news-summary {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* ─── 底部预防 ─────────────────────────────────────── */
        .bottom-panel {
            grid-column: 1 / 4;
            grid-row: 4;
        }

        .prevention-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .prevention-item {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .prevention-item:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .prevention-item.expanded {
            border-color: rgba(59, 130, 246, 0.6);
            background: rgba(30, 41, 59, 0.8);
        }

        .prevention-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .prevention-title {
            font-size: 12px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .prevention-detail {
            font-size: 11px;
            color: #94a3b8;
            line-height: 1.5;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .prevention-item.expanded .prevention-detail {
            max-height: 200px;
            opacity: 1;
            margin-top: 8px;
        }

        .prevention-arrow {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
            transition: transform 0.3s ease;
        }

        .prevention-item.expanded .prevention-arrow {
            transform: rotate(180deg);
        }

        /* ─── 数据来源标注 ─────────────────────────────────────── */
        .data-source {
            font-size: 11px;
            color: #475569;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
        }

        .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .risk-low-badge { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .risk-medium-badge { background: rgba(249, 115, 22, 0.2); color: #f97316; }

        /* ─── 滚动条 ─────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.5);
        }

        /* ─── 响应式 ─────────────────────────────────────── */
        @media (max-width: 1200px) {
            .main {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto;
                height: auto;
            }
            .cruise-card { grid-column: 1 / 3; grid-row: 1; }
            .map-container { grid-column: 1 / 3; grid-row: 2; height: 50vh; min-height: 300px; }
            .global-stats { grid-column: 1; grid-row: 3; }
            .country-list { grid-column: 2; grid-row: 3; max-height: 40vh; }
            .news-panel { grid-column: 1 / 3; grid-row: 4; }
            .bottom-panel { grid-column: 1 / 3; grid-row: 5; }
            .cruise-info { grid-template-columns: repeat(2, 1fr); }
            .cruise-detail:nth-child(4) { grid-column: span 2; }
        }

        @media (max-width: 768px) {
            body { font-size: 14px; }

            .navbar {
                height: 48px;
                padding: 0 12px;
            }

            .nav-title {
                font-size: 13px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .nav-subtitle { display: none; }

            .nav-status span:last-child {
                display: none;
            }

            .nav-update {
                font-size: 10px;
                padding: 2px 6px;
            }

            .main {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                padding: 12px;
                gap: 12px;
                height: auto;
            }

            .cruise-card {
                grid-column: 1;
                grid-row: 1;
            }

            .cruise-info {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .cruise-detail:nth-child(4) { grid-column: span 1; }

            .map-container {
                grid-column: 1;
                grid-row: 2;
                height: 50vh;
                min-height: 300px;
            }

            .global-stats {
                grid-column: 1;
                grid-row: 3;
            }

            .stat-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-value {
                font-size: 24px;
            }

            .stat-label {
                font-size: 10px;
            }

            .country-list {
                grid-column: 1;
                grid-row: 4;
                max-height: 35vh;
            }

            .news-panel {
                grid-column: 1;
                grid-row: 5;
                max-height: 35vh;
            }

            .bottom-panel {
                grid-column: 1;
                grid-row: 6;
            }

            .prevention-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .prevention-item {
                padding: 10px 8px;
            }

            .prevention-icon {
                font-size: 20px;
            }

            .prevention-title {
                font-size: 11px;
            }

            .prevention-detail {
                font-size: 10px;
            }

            .card {
                padding: 12px;
                border-radius: 8px;
            }

            .card-title {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }

            .prevention-grid {
                grid-template-columns: 1fr 1fr;
            }

            .news-title {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="14" fill="rgba(59, 130, 246, 0.15)" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1"/>
                    <circle cx="16" cy="16" r="8" fill="rgba(59, 130, 246, 0.25)" stroke="rgba(59, 130, 246, 0.5)" stroke-width="1"/>
                    <circle cx="16" cy="16" r="3" fill="rgba(59, 130, 246, 0.6)"/>
                    <line x1="16" y1="2" x2="16" y2="8" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1"/>
                    <line x1="16" y1="24" x2="16" y2="30" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1"/>
                    <line x1="2" y1="16" x2="8" y2="16" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1"/>
                    <line x1="24" y1="16" x2="30" y2="16" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1"/>
                    <line x1="6.1" y1="6.1" x2="10.3" y2="10.3" stroke="rgba(59, 130, 246, 0.3)" stroke-width="0.8"/>
                    <line x1="21.7" y1="21.7" x2="25.9" y2="25.9" stroke="rgba(59, 130, 246, 0.3)" stroke-width="0.8"/>
                    <line x1="25.9" y1="6.1" x2="21.7" y2="10.3" stroke="rgba(59, 130, 246, 0.3)" stroke-width="0.8"/>
                    <line x1="10.3" y1="21.7" x2="6.1" y2="25.9" stroke="rgba(59, 130, 246, 0.3)" stroke-width="0.8"/>
                </svg>
            </div>
            <span class="nav-title">汉坦病毒疫情看板</span>
            <span class="nav-subtitle">大西洋号邮轮事件</span>
        </div>
        <div class="nav-right">
            <div class="nav-status">
                <span class="status-dot"></span>
                <span>疫情监控中</span>
            </div>
            <div class="nav-update" id="lastUpdate">最后更新: --</div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main">
        <!-- 邮轮疫情信息 -->
        <div class="card cruise-card">
            <div class="card-header">
                <div class="card-title">🚢 大西洋号邮轮 (MV Hondius) 疫情</div>
                <span class="card-badge badge-red">紧急</span>
            </div>
            <div class="cruise-info">
                <div class="cruise-detail">
                    <div class="cruise-detail-label">涉及人数</div>
                    <div class="cruise-detail-value" id="cruisePeople">--</div>
                </div>
                <div class="cruise-detail">
                    <div class="cruise-detail-label">确诊 / 疑似</div>
                    <div class="cruise-detail-value" id="cruiseCases">--</div>
                </div>
                <div class="cruise-detail">
                    <div class="cruise-detail-label">病毒株</div>
                    <div class="cruise-detail-value" id="cruiseVirus">--</div>
                </div>
                <div class="cruise-detail">
                    <div class="cruise-detail-label">传播方式</div>
                    <div class="cruise-detail-value highlight" id="cruiseTransmission">--</div>
                </div>
                <div class="cruise-detail">
                    <div class="cruise-detail-label">WHO 风险评估</div>
                    <div class="cruise-detail-value" id="cruiseRisk">--</div>
                </div>
                <div class="cruise-detail">
                    <div class="cruise-detail-label">CDC 响应级别</div>
                    <div class="cruise-detail-value highlight" id="cruiseCDC">--</div>
                </div>
            </div>
        </div>

        <!-- 全球统计 -->
        <div class="card global-stats">
            <div class="card-header">
                <div class="card-title">📊 核心数据</div>
                <span class="card-badge badge-red">实时</span>
            </div>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-value red" id="totalCases">--</div>
                    <div class="stat-label">总病例</div>
                    <div class="stat-note" id="suspectedNote">疑似: --</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value orange" id="totalDeaths">--</div>
                    <div class="stat-label">死亡</div>
                </div>
                <div class="stat-item stat-highlight">
                    <div class="stat-value red" id="caseFatality">--</div>
                    <div class="stat-label">病死率 (CFR)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value cyan" id="totalSevere">--</div>
                    <div class="stat-label">重症</div>
                </div>
            </div>
            <div class="data-source">
                数据来源: WHO Disease Outbreak News, CDC, ECDC<br>
                统计起始: 2026年5月大西洋号邮轮疫情
            </div>
        </div>

        <!-- 地图 -->
        <div class="card map-container">
            <div id="map"></div>
            <div class="map-overlay">
                <div class="map-legend">
                    <div class="legend-item">
                        <div class="legend-dot high" style="background: #3b82f6; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);"></div>
                        <span>病例位置</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot medium" style="background: #f97316; box-shadow: 0 0 8px rgba(249, 115, 22, 0.5);"></div>
                        <span>邮轮疫情点</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 各国数据 -->
        <div class="card country-list">
            <div class="card-header">
                <div class="card-title">🌍 涉及国家</div>
                <span class="card-badge badge-blue" id="countryCount">-- 个国家</span>
            </div>
            <div id="countryList"></div>
        </div>

        <!-- 新闻 -->
        <div class="card news-panel">
            <div class="card-header">
                <div class="card-title">📰 疫情动态</div>
                <span class="card-badge badge-green" id="newsCount">-- 条</span>
            </div>
            <div id="newsList"></div>
        </div>

        <!-- 底部预防 -->
        <div class="card bottom-panel">
            <div class="card-header">
                <div class="card-title">🛡️ 预防措施</div>
            </div>
            <div class="prevention-grid" id="preventionGrid"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════
        //  全局状态
        // ═══════════════════════════════════════════════════════════
        let map = null;
        let markers = [];
        let dataCache = null;

        // ═══════════════════════════════════════════════════════════
        //  数据加载
        // ═══════════════════════════════════════════════════════════
        async function loadData() {
            try {
                const response = await fetch('data/latest_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                dataCache = await response.json();
                renderDashboard(dataCache);
                updateLastUpdateTime();
            } catch (error) {
                console.error('数据加载失败:', error);
            }
        }

        function updateLastUpdateTime() {
            if (dataCache && dataCache.timestamp) {
                const date = new Date(dataCache.timestamp);
                document.getElementById('lastUpdate').textContent = 
                    `最后更新: ${date.toLocaleString('zh-CN')}`;
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  渲染仪表盘
        // ═══════════════════════════════════════════════════════════
        function renderDashboard(data) {
            renderCruiseInfo(data.cruise_ship);
            renderGlobalStats(data.global);
            renderCountryList(data.regions);
            renderMap(data.outbreaks);
            renderNews(data.news);
            renderPrevention(data.risk.prevention_tips);
        }

        function renderCruiseInfo(cruise) {
            document.getElementById('cruisePeople').textContent = `${cruise.total_people} 人`;
            document.getElementById('cruiseCases').textContent = 
                `${cruise.confirmed} 确诊 / ${cruise.suspected} 疑似`;
            document.getElementById('cruiseVirus').textContent = cruise.virus;
            document.getElementById('cruiseTransmission').textContent = cruise.transmission;
            document.getElementById('cruiseRisk').innerHTML = 
                `<span class="risk-badge risk-low-badge">全球: 低</span> <span class="risk-badge risk-medium-badge">邮轮: 中</span>`;
            document.getElementById('cruiseCDC').textContent = cruise.cdc_level || 'Level 3 紧急响应';
        }

        function renderGlobalStats(global) {
            document.getElementById('totalCases').textContent = global.confirmed_cases;
            document.getElementById('suspectedNote').textContent = `疑似: ${global.suspected_cases}`;
            document.getElementById('totalDeaths').textContent = global.deaths;
            document.getElementById('caseFatality').textContent = global.case_fatality_rate + '%';
            document.getElementById('totalSevere').textContent = global.severe_cases;
        }

        function renderCountryList(regions) {
            const container = document.getElementById('countryList');
            document.getElementById('countryCount').textContent = `${regions.length} 个国家`;

            container.innerHTML = regions.map(r => {
                const riskClass = `risk-${r.risk_level}`;

                return `
                    <div class="country-item ${riskClass}" 
                         onclick="focusCountry(${r.lat || 0}, ${r.lng || 0})">
                        <div class="country-info">
                            <div class="country-name">${r.name}</div>
                            <div class="country-region">${r.region} · ${r.main_strain}</div>
                            <div class="country-detail">${r.detail || ''}</div>
                        </div>
                        <div class="country-stats">
                            <div class="country-cases">${r.confirmed}</div>
                            <div class="country-deaths">死亡 ${r.deaths}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMap(locations) {
            if (!map) {
                map = L.map('map', {
                    center: [10, -20],
                    zoom: 2,
                    zoomControl: false,
                    attributionControl: false,
                    preferCanvas: true
                });

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    subdomains: 'abcd',
                    updateWhenZooming: false,
                    keepBuffer: 2
                }).addTo(map);

                L.control.zoom({ position: 'bottomright' }).addTo(map);

                // 确保地图容器尺寸正确后刷新
                setTimeout(() => {
                    if (map) map.invalidateSize();
                }, 100);
            }

            markers.forEach(m => map.removeLayer(m));
            markers = [];

            locations.forEach(loc => {
                // 邮轮用橙色，其他用蓝色
                const color = loc.name.includes('邮轮') ? '#f97316' : '#3b82f6';
                const size = loc.name.includes('邮轮') ? 18 : Math.max(8, loc.cases * 2);

                const marker = L.circleMarker([loc.lat, loc.lng], {
                    radius: size,
                    fillColor: color,
                    color: color,
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.4
                }).addTo(map);

                marker.bindPopup(`
                    <div style="min-width: 200px;">
                        <h3 style="margin: 0 0 8px 0; font-size: 14px;">${loc.name}</h3>
                        <div style="font-size: 12px; color: #64748b; margin-bottom: 4px;">
                            病例: <b style="color: #f8fafc;">${loc.cases}</b>
                        </div>
                        <div style="font-size: 12px; color: #64748b;">
                            类型: ${loc.type === 'outbreak' ? '疫情爆发' : '地方性流行'}
                        </div>
                    </div>
                `);

                markers.push(marker);
            });

            // 延迟调整视野，确保地图尺寸正确
            setTimeout(() => {
                if (markers.length > 0 && map) {
                    const group = L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.15));
                }
            }, 150);
        }

        function focusCountry(lat, lng) {
            if (map && lat && lng) {
                map.setView([lat, lng], 5, { animate: true });
            }
        }

        function renderNews(news) {
            const container = document.getElementById('newsList');
            document.getElementById('newsCount').textContent = `${news.length} 条`;

            container.innerHTML = news.map(n => {
                const severityClass = `severity-${n.severity}`;
                const severityText = n.severity === 'critical' ? '严重' :
                                    n.severity === 'high' ? '高' :
                                    n.severity === 'medium' ? '中' :
                                    n.severity === 'low' ? '低' : '信息';

                return `
                    <div class="news-item">
                        <div class="news-header">
                            <div class="news-title">${n.title}</div>
                            <span class="news-severity ${severityClass}">${severityText}</span>
                        </div>
                        <div class="news-meta">${n.date} · ${n.source}</div>
                        <div class="news-summary">${n.summary}</div>
                    </div>
                `;
            }).join('');
        }

        function renderPrevention(tips) {
            const container = document.getElementById('preventionGrid');
            const icons = ['🧤', '🧴', '🏠', '💉', '🏥'];
            const titles = [
                '避免接触鼠类',
                '佩戴防护装备',
                '保持环境清洁',
                '接种疫苗',
                '及时就医'
            ];
            const details = [
                '避免接触鼠类及其排泄物。在鼠类活动区域工作时，不要徒手接触死鼠或活鼠。食物要密封保存，避免被鼠类污染。',
                '野外作业、清理鼠类污染区域时，必须佩戴 N95 口罩、手套、护目镜等防护装备。工作后彻底洗手消毒。',
                '保持居住环境清洁，定期清理垃圾和杂物。封堵房屋缝隙，防止鼠类进入。使用捕鼠器或灭鼠药控制鼠类数量。',
                '在高发地区，建议接种汉坦病毒疫苗。疫苗可有效降低感染风险，尤其适合野外作业人员、农民等高风险人群。',
                '出现发热、头痛、肌肉酸痛、呼吸困难等症状时，立即就医并告知医生可能的鼠类接触史。早期诊断和治疗可显著降低死亡率。'
            ];

            container.innerHTML = tips.map((tip, i) => `
                <div class="prevention-item" onclick="togglePrevention(this)">
                    <div class="prevention-icon">${icons[i] || '🛡️'}</div>
                    <div class="prevention-title">${titles[i] || tip}</div>
                    <div class="prevention-detail">${details[i] || tip}</div>
                    <div class="prevention-arrow">▼</div>
                </div>
            `).join('');
        }

        function togglePrevention(element) {
            document.querySelectorAll('.prevention-item.expanded').forEach(item => {
                if (item !== element) {
                    item.classList.remove('expanded');
                }
            });
            element.classList.toggle('expanded');
        }

        // ═══════════════════════════════════════════════════════════
        //  初始化
        // ═══════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setInterval(loadData, 30 * 60 * 1000);
        });

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (map) map.invalidateSize();
            }, 200);
        });
    </script>
</body>
</html>
